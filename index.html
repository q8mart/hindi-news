<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hindi Short News Card Generator</title>
<style>
  :root {
    --red: #d32020;
    --red-dark: #b71818;
    --border-red: #e01e26;
    --gold: #f5c518;
    --ink: #1a1a1a;
    --muted: #6b7280;
    --panel: #f4f5f7;
    --line: #d7dade;
    --font: "Nirmala UI", "Noto Sans", "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font);
    background: #e9ebee;
    color: var(--ink);
    padding: 24px;
  }
  .wrap {
    max-width: 1120px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 22px;
  }
  .panel h2 {
    margin: 0 0 18px;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 700;
  }
  label.field { display: block; font-size: 12.5px; color: #4b5563; margin: 14px 0 6px; }
  textarea {
    width: 100%;
    border: 1px solid #c7ccd2;
    border-radius: 8px;
    padding: 11px 12px;
    font-family: var(--font);
    font-size: 14px;
    resize: vertical;
    background: #fff;
    color: var(--ink);
  }
  textarea#input { min-height: 110px; }
  textarea#generated { min-height: 120px; }

  /* photo grid */
  .photos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 6px;
  }
  .slot {
    position: relative;
    aspect-ratio: 4 / 3;
    border: 2px dashed #c2c7cd;
    border-radius: 8px;
    background: #fbfbfc;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    color: var(--muted);
    font-size: 13px;
    transition: border-color .15s, background .15s;
  }
  .slot:hover { border-color: var(--red); background: #fff; }
  .slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .slot .remove {
    position: absolute;
    top: 6px; right: 6px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(0,0,0,.55);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 13px;
    line-height: 22px;
    text-align: center;
    padding: 0;
  }

  .btn {
    width: 100%;
    margin-top: 18px;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: var(--red);
    color: #fff;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  .btn:hover { background: var(--red-dark); }
  .hint { font-size: 11.5px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

  /* ---- preview card ---- */
  .preview-col { display: flex; flex-direction: column; align-items: center; }
  .card {
    width: 380px;
    max-width: 100%;
    background: #fff;
    border: 6px solid var(--border-red);
    border-radius: 12px;
    overflow: hidden;
  }
  .card .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
  }
  .card .head .burger { font-size: 22px; line-height: 1; }
  .card .head .brand { font-style: italic; font-weight: 800; font-size: 20px; letter-spacing: .5px; }
  .card .media {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: #dfe3e8;
    display: grid;
    gap: 2px;
    overflow: hidden;
  }
  .card .media.n1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  .card .media.n2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
  .card .media.n3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .card .media.n3 .c0 { grid-row: 1 / 3; }
  .card .media.n4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .card .media .cell { position: relative; overflow: hidden; background: #e5e7eb; }
  .card .media .cell .bg {
    position: absolute; inset: -8px;
    background-size: cover; background-position: center;
    filter: blur(12px) brightness(0.82);
  }
  .card .media .cell img {
    position: relative; width: 100%; height: 100%;
    object-fit: contain; display: block;
  }
  .card .media .empty {
    display: flex; align-items: center; justify-content: center;
    color: #8a929b; font-size: 13px; width: 100%; height: 100%;
  }
  .card .dots { display: flex; align-items: center; gap: 8px; padding: 12px 18px 0; }
  .card .dots .d { width: 9px; height: 9px; border-radius: 50%; background: var(--red); }
  .card .dots .rule { flex: 1; height: 2px; background: #e5e7eb; margin-left: 4px; }
  .card .headline {
    text-align: center;
    font-weight: 800;
    font-size: 16px;
    line-height: 1.4;
    padding: 14px 18px 4px;
  }
  .card .body {
    text-align: justify;
    font-size: 13.5px;
    line-height: 1.7;
    padding: 6px 18px 14px;
  }
  .card .foot-rule { height: 2px; background: #e5e7eb; margin: 0 18px; }
  .card .date-row { display: flex; justify-content: center; padding: 14px 0 18px; }
  .card .pill {
    background: var(--gold);
    color: #3a2f00;
    font-weight: 700;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 20px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <!-- ================= INPUT ================= -->
    <section class="panel">
      <h2>STEP 1 — INPUT</h2>

      <label class="field">Original news text (kisi bhi language mein paste karo)</label>
      <textarea id="input" placeholder="Yahan news ka text paste karo..."></textarea>

      <label class="field">Photos (upto 4, jaise collage mein chahiye)</label>
      <div class="photos" id="photos"></div>

      <button class="btn" id="generateBtn">Hindi Short News Generate Karo</button>

      <label class="field">Generated Hindi text (yahan edit/hata sakte ho)</label>
      <textarea id="generated" placeholder="Generate dabao ya seedha yahan Hindi text likho/paste karo..."></textarea>

      <button class="btn" id="downloadBtn">Template Image Download Karo</button>
      <p class="hint">Image seedha download ho jayegi. Agar browser block kare to nayi tab me khuli image par right-click karke &lsquo;Save Image As&rsquo; karo.</p>
    </section>

    <!-- ================= PREVIEW ================= -->
    <section class="panel preview-col">
      <h2>PREVIEW</h2>
      <div class="card" id="card">
        <div class="head">
          <span class="burger">&#9776;</span>
          <span class="brand">BREAKING NEWS</span>
        </div>
        <div class="media n1" id="media">
          <div class="empty">Photos add karo</div>
        </div>
        <div class="dots"><span class="d"></span><span class="d"></span><span class="d"></span><span class="rule"></span></div>
        <div class="headline" id="pvHeadline">Yahan headline aayegi</div>
        <div class="body" id="pvBody">Yahan news ka body text aayega. Generate dabao ya Hindi text box me likho.</div>
        <div class="foot-rule"></div>
        <div class="date-row"><span class="pill" id="pvDate">--/--/----</span></div>
      </div>
    </section>
  </div>

<script>
  // ---------- state ----------
  const MAX = 4;
  let photos = []; // array of {dataUrl, img}

  // ---------- date ----------
  function todayStr() {
    const d = new Date();
    const p = n => String(n).padStart(2, "0");
    return p(d.getDate()) + "/" + p(d.getMonth() + 1) + "/" + d.getFullYear();
  }

  // ---------- photo slots ----------
  const photosEl = document.getElementById("photos");
  function renderSlots() {
    photosEl.innerHTML = "";
    for (let i = 0; i < MAX; i++) {
      const slot = document.createElement("label");
      slot.className = "slot";
      if (photos[i]) {
        const img = document.createElement("img");
        img.src = photos[i].dataUrl;
        slot.appendChild(img);
        const rm = document.createElement("button");
        rm.className = "remove";
        rm.innerHTML = "&times;";
        rm.title = "Remove";
        rm.onclick = (e) => { e.preventDefault(); photos.splice(i, 1); renderSlots(); renderMedia(); };
        slot.appendChild(rm);
      } else {
        slot.textContent = "+ Add photo";
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.style.display = "none";
        input.onchange = (e) => handleFile(e.target.files[0]);
        slot.appendChild(input);
      }
      photosEl.appendChild(slot);
    }
  }
  function handleFile(file) {
    if (!file || photos.length >= MAX) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => { photos.push({ dataUrl: reader.result, img }); renderSlots(); renderMedia(); };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  // ---------- preview media collage ----------
  const mediaEl = document.getElementById("media");
  function renderMedia() {
    const n = photos.length;
    mediaEl.className = "media n" + (n || 1);
    mediaEl.innerHTML = "";
    if (n === 0) {
      const e = document.createElement("div");
      e.className = "empty";
      e.textContent = "Photos add karo";
      mediaEl.appendChild(e);
      return;
    }
    photos.forEach((p, i) => {
      const cell = document.createElement("div");
      cell.className = "cell c" + i;
      const bg = document.createElement("div");
      bg.className = "bg";
      bg.style.backgroundImage = "url(" + p.dataUrl + ")";
      const img = document.createElement("img");
      img.src = p.dataUrl;
      cell.appendChild(bg);
      cell.appendChild(img);
      mediaEl.appendChild(cell);
    });
  }

  // ---------- translation (any language -> Hindi) ----------
  // Uses Google's free public endpoint (auto-detects source language).
  // Falls back to MyMemory if that fails. Needs an internet connection.
  async function translateToHindi(text) {
    if (!text || !text.trim()) return text;
    try {
      const url = "https://translate.googleapis.com/translate_a/single"
        + "?client=gtx&sl=auto&tl=hi&dt=t&q=" + encodeURIComponent(text);
      const r = await fetch(url);
      if (!r.ok) throw new Error("google http " + r.status);
      const j = await r.json();
      return j[0].map(seg => seg[0]).join("");
    } catch (e) {
      // fallback (assumes English source)
      const url = "https://api.mymemory.translated.net/get?q="
        + encodeURIComponent(text) + "&langpair=en|hi";
      const r = await fetch(url);
      if (!r.ok) throw new Error("translation service unreachable");
      const j = await r.json();
      return j.responseData.translatedText;
    }
  }

  // ---------- generate ----------
  // Splits your text into headline + body (first line = headline, rest = body).
  function splitText(raw) {
    const lines = raw.split(/\n+/).map(s => s.trim()).filter(Boolean);
    if (lines.length === 0) return { headline: "", body: "" };
    const headline = lines[0];
    let body = lines.slice(1).join(" ").trim();
    if (!body) {
      // no second line: try to split headline into first sentence + rest
      const m = headline.match(/^(.+?[.!?।])\s+(.+)$/);
      if (m) return { headline: m[1].trim(), body: m[2].trim() };
    }
    return { headline, body };
  }
  document.getElementById("generateBtn").onclick = async () => {
    const btn = document.getElementById("generateBtn");
    const raw = document.getElementById("input").value;
    if (!raw.trim()) return;
    const label = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Translating... (Hindi mein badal rahe hain)";
    try {
      const lines = raw.split(/\n+/).map(s => s.trim()).filter(Boolean);
      const translated = [];
      for (const ln of lines) translated.push(await translateToHindi(ln));
      document.getElementById("generated").value = translated.join("\n");
      syncPreview();
    } catch (e) {
      alert("Translation fail hui: " + e.message
        + "\nInternet connection check karo ya thodi der baad try karo.");
    } finally {
      btn.disabled = false;
      btn.textContent = label;
    }
  };

  // ---------- preview text sync ----------
  function currentContent() {
    const { headline, body } = splitText(document.getElementById("generated").value);
    return { headline, body };
  }
  function syncPreview() {
    const { headline, body } = currentContent();
    document.getElementById("pvHeadline").textContent = headline || "Yahan headline aayegi";
    document.getElementById("pvBody").textContent = body || "Yahan news ka body text aayega.";
    document.getElementById("pvDate").textContent = todayStr();
  }
  document.getElementById("generated").addEventListener("input", syncPreview);

  // ================= DOWNLOAD (canvas render) =================
  function wrapLines(ctx, text, maxW) {
    const words = text.split(/\s+/).filter(Boolean);
    const lines = [];
    let cur = "";
    for (const w of words) {
      const test = cur ? cur + " " + w : w;
      if (ctx.measureText(test).width > maxW && cur) {
        lines.push(cur);
        cur = w;
      } else {
        cur = test;
      }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  function drawCover(ctx, img, dx, dy, dw, dh) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(dx, dy, dw, dh);
    ctx.clip();
    const ar = img.width / img.height;
    const box = dw / dh;
    let sw, sh, sx, sy;
    if (ar > box) { sh = img.height; sw = sh * box; sx = (img.width - sw) / 2; sy = 0; }
    else { sw = img.width; sh = sw / box; sx = 0; sy = (img.height - sh) / 2; }
    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
    ctx.restore();
  }

  // Fit WHOLE image inside the cell (no crop), with a blurred cover behind it.
  function drawFit(ctx, img, dx, dy, dw, dh) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(dx, dy, dw, dh);
    ctx.clip();
    // blurred backdrop (overscanned so blur edges stay outside the cell)
    ctx.filter = "blur(10px)";
    drawCover(ctx, img, dx - 12, dy - 12, dw + 24, dh + 24);
    ctx.filter = "none";
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fillRect(dx, dy, dw, dh);
    // full image, contained and centered
    const ar = img.width / img.height, box = dw / dh;
    let w, h;
    if (ar > box) { w = dw; h = dw / ar; } else { h = dh; w = dh * ar; }
    ctx.drawImage(img, dx + (dw - w) / 2, dy + (dh - h) / 2, w, h);
    ctx.restore();
  }

  function drawCollage(ctx, imgs, x, y, w, h) {
    const g = 3;
    if (imgs.length === 0) {
      ctx.fillStyle = "#dfe3e8"; ctx.fillRect(x, y, w, h);
      return;
    }
    if (imgs.length === 1) { drawFit(ctx, imgs[0], x, y, w, h); return; }
    if (imgs.length === 2) {
      const cw = (w - g) / 2;
      drawFit(ctx, imgs[0], x, y, cw, h);
      drawFit(ctx, imgs[1], x + cw + g, y, cw, h);
      return;
    }
    const cw = (w - g) / 2, ch = (h - g) / 2;
    if (imgs.length === 3) {
      drawFit(ctx, imgs[0], x, y, cw, h);
      drawFit(ctx, imgs[1], x + cw + g, y, cw, ch);
      drawFit(ctx, imgs[2], x + cw + g, y + ch + g, cw, ch);
      return;
    }
    // 4
    drawFit(ctx, imgs[0], x, y, cw, ch);
    drawFit(ctx, imgs[1], x + cw + g, y, cw, ch);
    drawFit(ctx, imgs[2], x, y + ch + g, cw, ch);
    drawFit(ctx, imgs[3], x + cw + g, y + ch + g, cw, ch);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function buildCanvas() {
    const S = 2;                 // supersample for crisp text
    const W = 440;               // base card width (px)
    const border = 6;
    const pad = 18;
    const innerW = W - border * 2;
    const contentW = innerW - pad * 2;

    const { headline, body } = currentContent();
    const dateTxt = todayStr();

    // measure pass on a temp ctx
    const tmp = document.createElement("canvas").getContext("2d");
    const fam = getComputedStyle(document.body).fontFamily;
    const hFont = "800 17px " + fam;
    const bFont = "400 14px " + fam;
    tmp.font = hyphenNo(tmp, hFont);
    const hLines = wrapLines(tmp, headline || " ", contentW);
    tmp.font = bFont;
    const bLines = wrapLines(tmp, body || " ", contentW);

    const headerH = 52;
    const mediaH = Math.round(innerW * 0.60);
    const dotsH = 26;
    const hLineH = 24, bLineH = 24;
    const headlineBlock = 12 + hLines.length * hLineH + 8;
    const bodyBlock = bLines.length * bLineH + 12;
    const ruleH = 12;
    const dateH = 56;

    const innerH = headerH + mediaH + dotsH + headlineBlock + bodyBlock + ruleH + dateH;
    const H = innerH + border * 2;

    const canvas = document.createElement("canvas");
    canvas.width = W * S;
    canvas.height = H * S;
    const ctx = canvas.getContext("2d");
    ctx.scale(S, S);
    ctx.textBaseline = "alphabetic";

    // red border card
    ctx.fillStyle = "#e01e26";
    roundRect(ctx, 0, 0, W, H, 12); ctx.fill();
    ctx.fillStyle = "#ffffff";
    roundRect(ctx, border, border, innerW, innerH, 7); ctx.fill();

    let y = border;

    // header
    ctx.fillStyle = "#1a1a1a";
    ctx.textAlign = "left";
    ctx.font = "400 22px " + fam;
    ctx.fillText("☰", border + pad, y + 34);
    ctx.textAlign = "right";
    ctx.font = "italic 800 20px " + fam;
    ctx.fillText("BREAKING NEWS", W - border - pad, y + 33);
    ctx.textAlign = "left";
    y += headerH;

    // media
    drawCollage(ctx, photos.map(p => p.img), border, y, innerW, mediaH);
    y += mediaH;

    // dots + rule
    const dy = y + 16;
    ctx.fillStyle = "#d32020";
    [0, 1, 2].forEach(i => {
      ctx.beginPath();
      ctx.arc(border + pad + 5 + i * 16, dy, 4.5, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.strokeStyle = "#e5e7eb"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(border + pad + 3 * 16 + 8, dy);
    ctx.lineTo(W - border - pad, dy);
    ctx.stroke();
    y += dotsH;

    // headline (centered)
    ctx.fillStyle = "#111";
    ctx.font = "800 17px " + fam;
    ctx.textAlign = "center";
    y += 12;
    hLines.forEach(line => { ctx.fillText(line, W / 2, y + 17); y += hLineH; });
    y += 8;

    // body (left aligned)
    ctx.fillStyle = "#222";
    ctx.font = "400 14px " + fam;
    ctx.textAlign = "left";
    bLines.forEach(line => { ctx.fillText(line, border + pad, y + 14); y += bLineH; });
    y += 12;

    // foot rule
    ctx.strokeStyle = "#e5e7eb"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(border + pad, y);
    ctx.lineTo(W - border - pad, y);
    ctx.stroke();
    y += ruleH;

    // date pill
    ctx.font = "700 13px " + fam;
    const tw = ctx.measureText(dateTxt).width;
    const pw = tw + 32, ph = 30;
    const px = (W - pw) / 2, py = y + 8;
    ctx.fillStyle = "#f5c518";
    roundRect(ctx, px, py, pw, ph, 15); ctx.fill();
    ctx.fillStyle = "#3a2f00";
    ctx.textAlign = "center";
    ctx.fillText(dateTxt, W / 2, py + 20);

    return canvas;
  }
  // small helper so JS lint stays happy about unused font var path
  function hyphenNo(ctx, f) { return f; }

  document.getElementById("downloadBtn").onclick = () => {
    const canvas = buildCanvas();
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "hindi-news-card.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }, "image/png");
  };

  // ---------- init ----------
  renderSlots();
  renderMedia();
  syncPreview();
</script>
</body>
</html>
