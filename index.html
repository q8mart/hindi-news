<div id="app-root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  #app-root {
    font-family: 'Segoe UI', 'Noto Sans Devanagari', sans-serif;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
    color: #1a1a1a;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }
  .panel {
    background: #fafafa;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 20px;
  }
  .panel h2 {
    margin: 0 0 14px 0;
    font-size: 16px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #b91c1c;
  }
  label.field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin: 14px 0 6px;
    color: #444;
  }
  textarea {
    width: 100%;
    min-height: 130px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    resize: vertical;
    font-family: inherit;
  }
  .img-slots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .img-slot {
    aspect-ratio: 1/1;
    border: 2px dashed #ccc;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #999;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: #fff;
  }
  .img-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .img-slot input { display: none; }
  .img-slot .remove-x {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px;
    height: 22px;
    background: rgba(0,0,0,0.7);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    z-index: 2;
  }
  .generate-btn {
    margin-top: 18px;
    width: 100%;
    padding: 13px;
    background: #b91c1c;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .generate-btn:disabled { background: #d1a3a3; cursor: not-allowed; }
  .download-btn {
    margin-top: 10px;
    width: 100%;
    padding: 11px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .status {
    margin-top: 10px;
    font-size: 13px;
    color: #666;
    min-height: 18px;
  }
  .preview-wrap {
    display: flex;
    justify-content: center;
  }

  /* --- The template card itself --- */
  .news-card {
    width: 480px;
    max-width: 100%;
    background: linear-gradient(160deg, #7a0000, #b91c1c);
    border-radius: 22px;
    padding: 14px;
  }
  .news-inner {
    background: white;
    border-radius: 16px;
    padding: 18px;
  }
  .news-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hamburger div {
    width: 22px;
    height: 3px;
    background: #1a1a1a;
  }
  .breaking-label {
    font-weight: 800;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.02em;
  }
  .grid-images {
    display: grid;
    gap: 6px;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 16/9;
    background: #eee;
  }
  .grid-images.count-1 {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
  }
  .grid-images.count-2 {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr;
  }
  .grid-images.count-3 {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }
  .grid-images.count-3 .cell:nth-child(1) {
    grid-row: 1 / 3;
    grid-column: 1;
  }
  .grid-images.count-3 .cell:nth-child(2) {
    grid-row: 1;
    grid-column: 2;
  }
  .grid-images.count-3 .cell:nth-child(3) {
    grid-row: 2;
    grid-column: 2;
  }
  .grid-images.count-4 {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }
  .grid-images.count-0 {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }
  .grid-images .cell {
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .grid-images .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .grid-images .cell.empty {
    color: #aaa;
    font-size: 11px;
  }
  .dots-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 16px 0 14px;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e34d3d;
  }
  .dots-row .line {
    flex: 1;
    height: 2px;
    background: #1a1a1a;
  }
  .hindi-text {
    font-size: 15.5px;
    line-height: 1.75;
    text-align: center;
    font-weight: 600;
    color: #111;
    white-space: pre-line;
    min-height: 60px;
  }
  .footer-rule {
    height: 2px;
    background: #1a1a1a;
    margin: 16px 0 14px;
  }
  .date-pill {
    background: #f5c518;
    color: #1a1a1a;
    font-weight: 800;
    font-size: 15px;
    padding: 8px 0;
    border-radius: 999px;
    text-align: center;
    width: 130px;
    margin: 0 auto;
  }
  .placeholder-text {
    color: #bbb;
    font-style: italic;
  }
</style>

<script type="text/babel">
const { useState, useRef } = React;

function App() {
  const [rawText, setRawText] = useState("");
  const [images, setImages] = useState([null, null, null, null]);
  const [hindiText, setHindiText] = useState("");
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState("");
  const cardRef = useRef(null);

  const today = new Date();
  const dateStr = String(today.getDate()).padStart(2,'0') + "/" + String(today.getMonth()+1).padStart(2,'0') + "/" + today.getFullYear();

  function handleImageUpload(idx, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const newImages = [...images];
      newImages[idx] = e.target.result;
      setImages(newImages);
    };
    reader.readAsDataURL(file);
  }

  function removeImage(idx, e) {
    e.preventDefault();
    e.stopPropagation();
    const newImages = [...images];
    newImages[idx] = null;
    setImages(newImages);
  }

  async function generateHindi() {
    if (!rawText.trim()) {
      setStatus("Pehle news ka text paste karo.");
      return;
    }
    setLoading(true);
    setStatus("Hindi mein short kar raha hoon...");
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 500,
          messages: [
            {
              role: "user",
              content: `Tum ek experienced Hindi news channel ke journalist ho (jaise Aaj Tak, ABP News). Neeche ek English/kisi bhi bhasha ki news di gayi hai — ise ek professional Hindi news reporter ke natural andaaz mein short breaking-news style mein likho.

Rules:
- Devanagari script mein likho, translation jaisa mehsoos na ho — ek insaan reporter jaisa naturally likha hua lage
- 3 se 5 chhoti, punchy lines, har line ek naya fact ya detail de
- Pehli line mein sabse important baat (jaise ek anchor headline bolta hai)
- Simple, rozmarra ke Hindi words use karo, bahut shudh/tatsam Hindi na use karo
- Numbers, jagah ke naam, amount jaise the waise hi rakho
- Koi emoji, hashtag, ya extra heading mat likho
- Sirf final Hindi paragraph do, kuch aur mat likho (na intro, na note)

News:
${rawText}`
            }
          ]
        })
      });
      const data = await response.json();
      const text = data.content.map(b => b.text || "").join("\n").trim();
      setHindiText(text);
      setStatus("Ban gaya. Neeche template mein dekh lo.");
    } catch (err) {
      setStatus("Kuch gadbad hui, dobara try karo.");
      console.error(err);
    }
    setLoading(false);
  }

  async function downloadImage() {
    if (!cardRef.current) return;
    setStatus("Image taiyaar ho rahi hai...");
    try {
      const canvas = await html2canvas(cardRef.current, { scale: 3, backgroundColor: null });
      const dataUrl = canvas.toDataURL("image/png");

      // Try direct download first
      const link = document.createElement("a");
      link.download = "breaking-news.png";
      link.href = dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Fallback: also open in a new tab so the person can right-click Save Image As
      const win = window.open();
      if (win) {
        win.document.write(
          '<title>Right-click aur Save Image As karo</title>' +
          '<body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;">' +
          '<img src="' + dataUrl + '" style="max-width:100%;height:auto;" />' +
          '</body>'
        );
        setStatus("Naya tab khula hai — agar direct download na ho to us image par right-click karke 'Save Image As' karo.");
      } else {
        setStatus("Download ho gaya. Agar file na mili to popup blocker check karo.");
      }
    } catch (err) {
      setStatus("Download mein error aayi, dobara try karo.");
      console.error(err);
    }
  }

  return (
    <div className="layout">
      <div className="panel">
        <h2>Step 1 — Input</h2>

        <label className="field-label">Original news text (kisi bhi language mein paste karo)</label>
        <textarea value={rawText} onChange={e => setRawText(e.target.value)} placeholder="Yahan news ka text paste karo..." />

        <label className="field-label">Photos (upto 4, jaise collage mein chahiye)</label>
        <div className="img-slots">
          {images.map((img, idx) => (
            <label className="img-slot" key={idx}>
              {img ? <img src={img} /> : <span>+ Add photo</span>}
              {img && <span className="remove-x" onClick={(e) => removeImage(idx, e)}>×</span>}
              <input type="file" accept="image/*" onChange={e => handleImageUpload(idx, e.target.files[0])} />
            </label>
          ))}
        </div>

        <button className="generate-btn" onClick={generateHindi} disabled={loading}>
          {loading ? "Generate ho raha hai..." : "Hindi Short News Generate Karo"}
        </button>

        <label className="field-label">Generated Hindi text (yahan edit/hata sakte ho)</label>
        <textarea value={hindiText} onChange={e => setHindiText(e.target.value)} placeholder="Generate karne ke baad text yahan aayega, ya khud bhi likh sakte ho..." />

        <button className="download-btn" onClick={downloadImage}>
          Template Image Download Karo
        </button>
        <div className="status">{status}</div>
      </div>

      <div className="panel preview-wrap">
        <div>
          <h2 style={{textAlign:'center'}}>Preview</h2>
          <div className="news-card" ref={cardRef}>
            <div className="news-inner">
              <div className="news-header">
                <div className="hamburger"><div></div><div></div><div></div></div>
                <div className="breaking-label">BREAKING NEWS</div>
              </div>

              <div className={"grid-images count-" + images.filter(Boolean).length}>
                {images.filter(Boolean).length === 0 ? (
                  [0,1,2,3].map(idx => (
                    <div className="cell" key={idx}><span className="empty">Photo {idx+1}</span></div>
                  ))
                ) : (
                  images.filter(Boolean).map((img, idx) => (
                    <div className="cell" key={idx}><img src={img} /></div>
                  ))
                )}
              </div>

              <div className="dots-row">
                <div className="dot"></div>
                <div className="dot"></div>
                <div className="dot"></div>
                <div className="line"></div>
              </div>

              <div className="hindi-text">
                {hindiText ? hindiText : <span className="placeholder-text">Generated Hindi news yahan dikhega...</span>}
              </div>

              <div className="footer-rule"></div>
              <div className="date-pill">{dateStr}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
