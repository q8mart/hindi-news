<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>News Video Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#f4f4f4; color:#111; }
  #app-root { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  h1 { color:#b91c1c; }
  .panel { background: white; border:1px solid #e2e2e2; border-radius:12px; padding:18px; margin-bottom:18px; }
  .news-item { display:grid; grid-template-columns: 140px 1fr auto; gap:14px; align-items:start; padding:12px 0; border-bottom:1px solid #eee; }
  .news-item textarea { width:100%; min-height:70px; padding:8px; border:1px solid #ccc; border-radius:6px; font-family:inherit; font-size:13px; }
  .photo-slot { width:120px; height:120px; border:2px dashed #ccc; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; font-size:11px; color:#999; text-align:center; }
  .photo-slot img { width:100%; height:100%; object-fit:cover; }
  .btn { background:#b91c1c; color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:700; cursor:pointer; font-size:14px; }
  .btn.secondary { background:#333; }
  .btn.small { padding:6px 12px; font-size:12px; }
  select, input[type=range] { padding:6px; border-radius:6px; border:1px solid #ccc; }

  .stage-wrap { display:flex; justify-content:center; background:#000; border-radius:12px; padding:10px; }
  .stage { position:relative; width:405px; height:720px; background:#000; overflow:hidden; border-radius:8px; }
  .stage img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; transition: transform 8s linear; }
  .stage .overlay-text { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent, rgba(0,0,0,0.85) 40%); color:white; padding:30px 20px 26px; font-size:16px; font-weight:700; line-height:1.5; text-align:center; }
  .stage .brand-bar { position:absolute; top:0; left:0; right:0; background:#b91c1c; color:white; padding:10px 16px; font-weight:800; font-style:italic; font-size:15px; display:flex; justify-content:space-between; }
  .controls { display:flex; gap:10px; align-items:center; margin-top:14px; justify-content:center; flex-wrap:wrap; }
  canvas#thumbCanvas { display:none; }
  .thumb-preview { max-width:100%; border-radius:8px; border:2px solid #b91c1c; margin-top:10px; }
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const DEFAULT_NEWS = [
  { text: "कुवैत फायर फोर्स ने बताया कि शुक्रवार तड़के ईरानी हमलों के बाद दक्षिणी कुवैत के दो अलग-अलग स्थानों पर लगी आग पर सफलतापूर्वक काबू पा लिया गया। पहले स्थान पर 6 फायर ब्रिगेड टीमों ने, जबकि दूसरे स्थान पर 3 टीमों ने कुवैत सेना और नेशनल गार्ड के सहयोग से राहत एवं बचाव अभियान चलाया। अधिकारियों के अनुसार, इस घटना में कोई जनहानि नहीं हुई।", photo: null },
  { text: "ईरानी हमले में क्षतिग्रस्त हुए बिजली उत्पादन और जल विलवणीकरण स्टेशन का निरीक्षण करने ऊर्जा मंत्री डॉ. सुबैह अल-मुखैज़ीम पहुंचे। मंत्री ने नुकसान का जायज़ा लिया और अधिकारियों को मरम्मत का काम तेज़ करने के निर्देश दिए। बिजली और पानी की आपूर्ति बिना रुकावट जारी रखने पर ज़ोर दिया गया।", photo: null },
  { text: "जलीब में जब्त वाहनों को छुड़ाने के लिए आवेदन शुरू। कुवैत के जनरल ट्रैफिक डिपार्टमेंट ने जलीब अल शुयूख इंपाउंड गैराज में जब्त वाहनों की रिहाई के लिए आवेदन लेने की घोषणा की है। वाहन मालिकों को सभी लंबित ट्रैफिक जुर्माने भरने होंगे।", photo: null },
  { text: "चीन के चोंगकिंग में भूस्खलन, कई घर दबे। दक्षिण-पश्चिम चीन के चोंगकिंग में भारी बारिश के कारण हुए भूस्खलन में 10 से ज्यादा घर दब गए। अधिकारियों ने 1,100 से अधिक लोगों को सुरक्षित निकाल लिया। 800 से ज्यादा बचावकर्मी लापता लोगों की तलाश में जुटे हैं।", photo: null },
];

function App() {
  const [news, setNews] = useState(DEFAULT_NEWS);
  const [current, setCurrent] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [voices, setVoices] = useState([]);
  const [voiceIdx, setVoiceIdx] = useState(-1);
  const [rate, setRate] = useState(0.95);
  const [thumbTitle, setThumbTitle] = useState("आज की बड़ी खबरें");
  const [thumbUrl, setThumbUrl] = useState("");
  const [recording, setRecording] = useState(false);
  const [videoUrl, setVideoUrl] = useState("");
  const [recStatus, setRecStatus] = useState("");
  const stageImgRef = useRef(null);
  const thumbCanvasRef = useRef(null);
  const stageCanvasRef = useRef(null);
  const recorderRef = useRef(null);
  const chunksRef = useRef([]);
  const animRef = useRef(null);
  const imgCacheRef = useRef({});

  useEffect(() => {
    function loadVoices() {
      const v = window.speechSynthesis.getVoices();
      setVoices(v);
      const hindiIdx = v.findIndex(x => x.lang.startsWith('hi'));
      if (hindiIdx >= 0) setVoiceIdx(hindiIdx);
    }
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }, []);

  useEffect(() => {
    if (!playing && stageCanvasRef.current) {
      drawStageFrame(current, 0);
    }
  }, [current, news, playing]);

  function updateText(idx, val) {
    const n = [...news]; n[idx] = { ...n[idx], text: val }; setNews(n);
  }
  function updatePhoto(idx, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const n = [...news]; n[idx] = { ...n[idx], photo: e.target.result }; setNews(n);
    };
    reader.readAsDataURL(file);
  }
  function addNews() { setNews([...news, { text: "", photo: null }]); }
  function removeNews(idx) { setNews(news.filter((_,i) => i!==idx)); }

  function speak(text, onEnd) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (voiceIdx >= 0 && voices[voiceIdx]) utter.voice = voices[voiceIdx];
    utter.lang = 'hi-IN';
    utter.rate = rate;
    utter.onend = onEnd;
    window.speechSynthesis.speak(utter);
  }

  function getImg(src) {
    if (!src) return Promise.resolve(null);
    if (imgCacheRef.current[src]) return Promise.resolve(imgCacheRef.current[src]);
    return new Promise(res => {
      const im = new Image();
      im.onload = () => { imgCacheRef.current[src] = im; res(im); };
      im.src = src;
    });
  }

  function drawCover(ctx, img, x, y, w, h, zoom) {
    zoom = zoom || 1;
    const scale = Math.max(w/img.width, h/img.height) * zoom;
    const sw = w/scale, sh = h/scale;
    const sx = (img.width - sw)/2, sy = (img.height - sh)/2;
    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  }

  function wrapAndDraw(ctx, text, x, y, maxWidth, lineHeight, align) {
    const words = text.split(' ');
    let line = '';
    const lines = [];
    for (let w of words) {
      const test = line + w + ' ';
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line); line = w + ' ';
      } else line = test;
    }
    lines.push(line);
    lines.forEach((l,i) => {
      const lw = ctx.measureText(l.trim()).width;
      const lx = align === 'center' ? x - lw/2 : x;
      ctx.fillText(l.trim(), lx, y + i*lineHeight);
    });
    return lines.length;
  }

  async function drawStageFrame(idx, zoomProgress) {
    const canvas = stageCanvasRef.current;
    const W = 810, H = 1440;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);

    const item = news[idx];
    if (item && item.photo) {
      const img = await getImg(item.photo);
      if (img) {
        const zoom = 1 + 0.15 * zoomProgress;
        drawCover(ctx, img, 0, 0, W, H, zoom);
      }
    }
    // bottom gradient
    const grad = ctx.createLinearGradient(0, H*0.55, 0, H);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.9)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, H*0.55, W, H*0.45);

    // top red brand bar
    ctx.fillStyle = '#b91c1c';
    ctx.fillRect(0,0,W,90);
    ctx.fillStyle = 'white';
    ctx.font = 'italic 900 34px Arial';
    ctx.fillText('BREAKING NEWS', 30, 58);

    // overlay text (centered, wrapped)
    if (item) {
      ctx.fillStyle = 'white';
      ctx.font = '700 30px Arial';
      ctx.textAlign = 'left';
      const text = item.text.slice(0, 260);
      wrapAndDraw(ctx, text, W/2, H-190, W-80, 40, 'center');
    }
  }

  function playAll(onFinish, useCanvas) {
    setPlaying(true);
    let idx = 0;
    setCurrent(0);
    let rafId = null;
    let itemStartTime = performance.now();

    function animateFrame() {
      const elapsed = (performance.now() - itemStartTime) / 1000;
      const progress = Math.min(elapsed / 6, 1);
      if (useCanvas) drawStageFrame(idx, progress);
      if (stageImgRef.current && !useCanvas) {
        stageImgRef.current.style.transform = `scale(${1 + 0.15*progress})`;
      }
      rafId = requestAnimationFrame(animateFrame);
    }
    if (useCanvas || true) rafId = requestAnimationFrame(animateFrame);

    function playNext() {
      if (idx >= news.length) {
        setPlaying(false);
        if (rafId) cancelAnimationFrame(rafId);
        if (onFinish) onFinish();
        return;
      }
      setCurrent(idx);
      itemStartTime = performance.now();
      speak(news[idx].text, () => {
        idx++;
        setTimeout(playNext, 400);
      });
    }
    playNext();
  }

  async function recordAndDownload() {
    setRecStatus("Popup mein koi bhi tab chuno aur 'Share tab audio' checkbox ON karo (video ye tab nahi, sirf news canvas record hoga)...");
    try {
      const displayStream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true,
        preferCurrentTab: true,
        selfBrowserSurface: "include"
      });
      const audioTracks = displayStream.getAudioTracks();
      if (audioTracks.length === 0) {
        setRecStatus("Audio share nahi hua — popup mein 'Share tab audio' checkbox zaroor ON karna hai. Dobara try karo.");
        displayStream.getTracks().forEach(t=>t.stop());
        return;
      }
      // stop the shared screen/tab video track, we only want its audio
      displayStream.getVideoTracks().forEach(t => t.stop());

      const canvasStream = stageCanvasRef.current.captureStream(30);
      const combined = new MediaStream([...canvasStream.getVideoTracks(), ...audioTracks]);

      const recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9,opus' });
      chunksRef.current = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        setVideoUrl(url);
        setRecStatus("Video ready hai! Neeche download button dabao.");
        displayStream.getTracks().forEach(t => t.stop());
      };
      recorderRef.current = recorder;
      recorder.start();
      setRecording(true);
      setRecStatus("Recording chal rahi hai — sirf news video record ho raha hai...");
      playAll(() => {
        setTimeout(() => {
          if (recorderRef.current && recorderRef.current.state !== 'inactive') recorderRef.current.stop();
          setRecording(false);
        }, 500);
      }, true);
    } catch (err) {
      setRecStatus("Recording start nahi ho payi. Popup mein 'Share tab audio' checkbox zaroor ON karo. (" + err.message + ")");
    }
  }

  function downloadVideo() {
    const link = document.createElement('a');
    link.download = 'news-video.webm';
    link.href = videoUrl;
    link.click();
  }

  function stopPlay() {
    window.speechSynthesis.cancel();
    setPlaying(false);
    if (recorderRef.current && recorderRef.current.state !== 'inactive') recorderRef.current.stop();
    setRecording(false);
  }

  function generateThumbnail() {
    const canvas = thumbCanvasRef.current;
    const W = 1280, H = 720;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,W,H);

    const photos = news.map(n=>n.photo).filter(Boolean).slice(0,3);
    const loadImg = src => new Promise(res => { const im = new Image(); im.onload=()=>res(im); im.src=src; });

    Promise.all(photos.map(loadImg)).then(imgs => {
      if (imgs.length === 0) {
        ctx.fillStyle = '#333'; ctx.fillRect(0,0,W,H);
      } else if (imgs.length === 1) {
        drawCover(ctx, imgs[0], 0,0,W,H);
      } else if (imgs.length === 2) {
        drawCover(ctx, imgs[0], 0,0,W/2-4,H);
        drawCover(ctx, imgs[1], W/2+4,0,W/2-4,H);
      } else {
        drawCover(ctx, imgs[0], 0,0,W*0.6,H);
        drawCover(ctx, imgs[1], W*0.6+6,0,W*0.4-6,H/2-4);
        drawCover(ctx, imgs[2], W*0.6+6,H/2+4,W*0.4-6,H/2-4);
      }
      // dark gradient at bottom for text
      const grad = ctx.createLinearGradient(0,H*0.55,0,H);
      grad.addColorStop(0,'rgba(0,0,0,0)');
      grad.addColorStop(1,'rgba(0,0,0,0.88)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,H*0.55,W,H*0.45);

      // top red breaking news bar
      ctx.fillStyle = '#b91c1c';
      ctx.fillRect(0,0,W,70);
      ctx.fillStyle = 'white';
      ctx.font = 'italic 900 34px Arial';
      ctx.fillText('BREAKING NEWS', 30, 48);

      // title text
      ctx.fillStyle = 'white';
      ctx.font = '900 58px Arial';
      wrapText(ctx, thumbTitle, 30, H-90, W-60, 62);

      setThumbUrl(canvas.toDataURL('image/png'));
    });
  }

  function drawCover(ctx, img, x, y, w, h) {
    const scale = Math.max(w/img.width, h/img.height);
    const sw = w/scale, sh = h/scale;
    const sx = (img.width - sw)/2, sy = (img.height - sh)/2;
    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    const lines = [];
    for (let w of words) {
      const test = line + w + ' ';
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line); line = w + ' ';
      } else line = test;
    }
    lines.push(line);
    const startY = y - (lines.length-1)*lineHeight;
    lines.forEach((l,i) => ctx.fillText(l.trim(), x, startY + i*lineHeight));
  }

  function downloadThumb() {
    const link = document.createElement('a');
    link.download = 'youtube-thumbnail.png';
    link.href = thumbUrl;
    link.click();
  }

  return (
    <div>
      <h1>News Video Maker</h1>

      <div className="panel">
        <h2 style={{fontSize:15, color:'#b91c1c'}}>Step 1 — News Items (text + photo)</h2>
        {news.map((n, idx) => (
          <div className="news-item" key={idx}>
            <label className="photo-slot">
              {n.photo ? <img src={n.photo} /> : <span>+ Photo daalo</span>}
              <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>updatePhoto(idx, e.target.files[0])} />
            </label>
            <textarea value={n.text} onChange={e=>updateText(idx, e.target.value)} placeholder="Hindi news text..." />
            <button className="btn small secondary" onClick={()=>removeNews(idx)}>Remove</button>
          </div>
        ))}
        <button className="btn small" style={{marginTop:12}} onClick={addNews}>+ Add News</button>
      </div>

      <div className="panel">
        <h2 style={{fontSize:15, color:'#b91c1c'}}>Step 2 — Preview aur Voice Settings</h2>
        <div className="controls" style={{marginBottom:14}}>
          <label>Voice: </label>
          <select value={voiceIdx} onChange={e=>setVoiceIdx(parseInt(e.target.value))}>
            {voices.map((v,i) => <option key={i} value={i}>{v.name} ({v.lang})</option>)}
          </select>
          <label>Speed: </label>
          <input type="range" min="0.6" max="1.3" step="0.05" value={rate} onChange={e=>setRate(parseFloat(e.target.value))} />
          <span>{rate.toFixed(2)}x</span>
        </div>

        <div className="stage-wrap">
          <canvas ref={stageCanvasRef} width="810" height="1440" style={{width:405, height:720, borderRadius:8, background:'#000'}}></canvas>
        </div>

        <div className="controls">
          {!playing
            ? <button className="btn" onClick={()=>playAll(null, true)}>▶ Preview Only (no recording)</button>
            : <button className="btn secondary" onClick={stopPlay}>⏹ Stop</button>}
          <span style={{fontSize:12, color:'#666'}}>News {current+1} / {news.length}</span>
        </div>

        <div className="controls" style={{marginTop:14}}>
          <button className="btn" onClick={recordAndDownload} disabled={recording}>
            {recording ? "⏺ Recording..." : "⏺ Record & Download Video"}
          </button>
        </div>
        {recStatus && <div style={{fontSize:12, color:'#b91c1c', marginTop:8, textAlign:'center'}}>{recStatus}</div>}
        {videoUrl && <div style={{textAlign:'center', marginTop:10}}>
          <video src={videoUrl} controls style={{maxWidth:300, borderRadius:8}}></video><br/>
          <button className="btn secondary" style={{marginTop:8}} onClick={downloadVideo}>Download Video (.webm)</button>
        </div>}

        <div style={{fontSize:12, color:'#666', marginTop:10}}>
          "Record & Download Video" dabane par browser ek popup dega — usme <strong>"This Tab"</strong> chuno aur <strong>"Share tab audio"</strong> checkbox zaroor ON karo, phir Share dabao. Video khud-ba-khud record hokar niche download ho jayegi.
        </div>
      </div>

      <div className="panel">
        <h2 style={{fontSize:15, color:'#b91c1c'}}>Step 3 — YouTube Thumbnail (automatic, direct download)</h2>
        <div className="controls" style={{marginBottom:10}}>
          <label>Thumbnail Title:</label>
          <input value={thumbTitle} onChange={e=>setThumbTitle(e.target.value)} style={{flex:1, minWidth:250, padding:8, borderRadius:6, border:'1px solid #ccc'}} />
        </div>
        <button className="btn" onClick={generateThumbnail}>Generate Thumbnail</button>
        {thumbUrl && <React.Fragment>
          <div><img src={thumbUrl} className="thumb-preview" /></div>
          <button className="btn secondary" style={{marginTop:10}} onClick={downloadThumb}>Download Thumbnail PNG</button>
        </React.Fragment>}
        <canvas ref={thumbCanvasRef} id="thumbCanvas"></canvas>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
